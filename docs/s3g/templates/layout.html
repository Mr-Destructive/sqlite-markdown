<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{title}}</title>
  <style>
    :root { --bg:#f7f5ef; --ink:#222; --muted:#666; --paper:#fffdf8; }
    body { margin:0; background:var(--bg); color:var(--ink); font:18px/1.7 Georgia,serif; }
    .wrap { max-width:780px; margin:2rem auto; padding:0 1rem; }
    .card { background:var(--paper); border:1px solid #e8e2d6; border-radius:12px; padding:1.5rem; }
    pre { overflow:auto; padding:.8rem; background:#f0ece2; border-radius:8px; }
    code { font-family:ui-monospace,Menlo,Consolas,monospace; font-size:.95em; }
    a { color:#0a5d7a; }
    footer { color:var(--muted); margin-top:2rem; font-size:.95rem; }
  </style>
</head>
<body>
  <main class="wrap">
    {{body}}
    <footer>Generated by SQLite Markdown SSG</footer>
  </main>
</body>
</html>
